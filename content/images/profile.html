<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #F7F3EC;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74, 93, 63, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74, 93, 63, 0.08) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(60px); }
  .g1 { width: 200px; height: 200px; background: rgba(74, 93, 63, 0.1); top: -40px; left: -40px; }
  .g2 { width: 160px; height: 160px; background: rgba(196, 83, 58, 0.06); bottom: -30px; right: -30px; }

  /* Robot face in warm palette */
  .face {
    width: 200px;
    height: 200px;
    background: linear-gradient(180deg, #EDE7DB 0%, #E4DDD0 100%);
    border-radius: 40px;
    border: 2px solid rgba(74, 93, 63, 0.2);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .eyes { display: flex; gap: 36px; margin-top: -16px; }
  .eye {
    width: 44px;
    height: 44px;
    background: #4A5D3F;
    border-radius: 10px;
    box-shadow: 0 0 16px rgba(74, 93, 63, 0.5), 0 0 32px rgba(74, 93, 63, 0.15);
    position: relative;
  }
  .eye::after {
    content: '';
    position: absolute;
    top: 7px;
    left: 7px;
    width: 14px;
    height: 14px;
    background: rgba(247, 243, 236, 0.7);
    border-radius: 5px;
  }
  .mouth {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
  }
  .mouth-dot {
    width: 10px;
    height: 10px;
    background: #C4533A;
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(196, 83, 58, 0.4);
  }
  .antenna {
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 24px;
    background: rgba(74, 93, 63, 0.4);
  }
  .antenna::after {
    content: '';
    position: absolute;
    top: -7px;
    left: -5px;
    width: 13px;
    height: 13px;
    background: #4A5D3F;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(74, 93, 63, 0.6);
  }
</style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="face">
    <div class="antenna"></div>
    <div class="eyes">
      <div class="eye"></div>
      <div class="eye"></div>
    </div>
    <div class="mouth">
      <div class="mouth-dot"></div>
      <div class="mouth-dot"></div>
      <div class="mouth-dot"></div>
      <div class="mouth-dot"></div>
      <div class="mouth-dot"></div>
    </div>
  </div>
</body>
</html>
