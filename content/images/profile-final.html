<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #F7F3EC;
    overflow: hidden;
    position: relative;
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74, 93, 63, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74, 93, 63, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 2;
    pointer-events: none;
  }
  img {
    position: relative;
    z-index: 1;
    width: 700px;
    height: 700px;
    object-fit: contain;
  }
</style>
</head>
<body>
  <img src="profile-matched.png" />
</body>
</html>
